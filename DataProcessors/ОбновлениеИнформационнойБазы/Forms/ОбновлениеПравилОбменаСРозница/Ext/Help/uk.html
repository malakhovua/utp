<h1>Обновление правил обмена с конфигурацией "Розница"</h1>
<p> </p>
<p>Предназначена для обновления правил обмена с конфигурацией "Розница". Правила обмена в настройках обмена данными с конфигурацией "Розница" будут заменены новыми правилами обмена.</p></body></html>
