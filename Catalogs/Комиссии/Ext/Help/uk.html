<h1 class="">Справочник «Комиссии» </h1>
<p class="Usual">Справочник «Комиссии» предназначен для хранения наименований комиссий, подписи членов которых используются при печати документов.</p>
<p class="Usual">Сведения о составе комиссий хранятся в <a href="../idn0">регистре сведений "Состав комиссий"</a>.<a href="../idn0"></a></p>
