<h1 class="">Регистр сведений "Встречный выпуск продукции (услуг)"</h1>
<p class="Usual">Регистр сведений предназначен для указания порядка расчета себестоимости встречного выпуска продукции и услуг.</p>
<p class="Usual">Регистр является периодическим, что позволяет для разных периодов указывать разный порядок расчета.</p></body></html>
