<h1 class="">Регистр сведений "Счета бухгалтерского учета нематериальных активов"</h1>
<p class="Usual">Данный регистр является хранилищем счета учета стоимости и суммы накопленной амортизации в организации объектов НМА  по бухгалтерскому учету.</p>
<p class="Usual">Счета устанавливаются документом <a href="Document.ПринятиеКУчетуНМА/Help">"Принятие к учету НМА организаций"</a>.</p></body></html>
