<h1>Регистр сведений "Коэффициент резерва отпусков"</h1>
<p>В регистре сведений хранится информация о коэффициентах резерва отпусков. Данные регистра используются при формировании проводок по отражению в бухгалтерском учете оплаты отпусков в документе <a href="Document.НачислениеЗарплатыРаботникамОрганизаций/Help">"Начисление зарплаты работникам организаций"</a>. </p></body></html>
