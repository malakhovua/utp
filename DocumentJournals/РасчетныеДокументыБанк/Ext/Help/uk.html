<h1 class="">Журнал "Банковские расчетные документы"</h1>
<p>В журнале отображаются документы, изменяющие остаток денежных средств на счетах организаций. При необходимости, можно установить отбор по организации и (или) банковскому счету, заполнив поля "Организация" или "Банковский счет".</p></body></html>
