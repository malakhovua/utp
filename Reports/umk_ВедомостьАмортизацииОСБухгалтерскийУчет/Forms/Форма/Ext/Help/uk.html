<h1>Звіт "Відомість амортизації ОЗ"</h1>
<p>У звіті "Відомість амортизації ОЗ" можна вивести дані про нараховану за період амортизації основних засобів. У звіті можна встановити швидкий відбір по основним засобам. </p>
<p>Дані про амортизацію виводяться за даними бухгалтерського обліку</p></body></html>
