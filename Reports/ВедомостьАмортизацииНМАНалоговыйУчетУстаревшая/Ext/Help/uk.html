<h1>Отчет "Ведомость амортизации НМА (налоговый учет)"</h1>
<p>В отчете "Ведомость амортизации НМА" можно вывести данные о начисленной за период амортизации нематериальных активов.</p>
<p>Данные об амортизации выводятся по данным налогового учета.</p></body></html>
