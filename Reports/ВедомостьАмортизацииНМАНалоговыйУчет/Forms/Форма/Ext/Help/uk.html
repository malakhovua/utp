<h1>Отчет "Ведомость амортизации ОС"</h1>
<p>В отчете "Ведомость амортизации ОС" можно вывести данные о начисленной за период амортизации основных средств. В отчете можно установить быстрый отбор по основным средствам. </p>
<p>Данные об амортизации выводятся по данным бухгалтерского учета.</p></body></html>
